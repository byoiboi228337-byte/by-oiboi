<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --accent-blue: #0f3460;
            --text: #eaeaea;
            --text-muted: #888;
            --border: #2a2a4a;
            --success: #4ade80;
            --warning: #fbbf24;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
        }
        
        /* Sidebar */
        #sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 16px;
            overflow-y: auto;
            z-index: 100;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 10px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--success);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .panel {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 14px;
        }
        
        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        /* Palette */
        #palette {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }
        
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .color-swatch:hover {
            transform: scale(1.15);
            z-index: 2;
        }
        
        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 12px var(--accent);
            transform: scale(1.1);
        }
        
        /* Color Picker */
        .color-picker-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }
        
        .color-hex {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-family: monospace;
            font-size: 14px;
        }
        
        #custom-colors {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .custom-color {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .custom-color:hover {
            border-color: var(--accent);
            transform: scale(1.1);
        }
        
        /* Buttons */
        .btn-group {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: var(--border);
        }
        
        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        
        .btn-accent:hover {
            background: var(--accent-hover);
        }
        
        .btn-danger {
            background: #dc2626;
            border-color: #dc2626;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        /* Help */
        .help-item {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .help-key {
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        /* Main Canvas Area */
        #main {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        canvas {
            display: block;
        }
        
        /* Overlays */
        #coords {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 10px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        
        #cooldown {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(233, 69, 96, 0.9);
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        #pixel-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 10px;
            display: none;
            backdrop-filter: blur(10px);
        }
        
        #pixel-color {
            font-weight: bold;
            font-family: monospace;
        }
        
        /* Zoom Controls */
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .zoom-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(26, 26, 46, 0.95);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        
        .zoom-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        /* Mini Map */
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 80px;
            width: 150px;
            height: 150px;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-primary);
        }
        
        #minimap-canvas {
            width: 100%;
            height: 100%;
        }
        
        #minimap-viewport {
            position: absolute;
            border: 2px solid var(--accent);
            background: rgba(233, 69, 96, 0.2);
            pointer-events: none;
        }
        
        /* Loading */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 20px;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <div>Загрузка Pixel Battle...</div>
    </div>
    
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="logo">🎨 Pixel Battle</div>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="online">-</div>
                <div class="stat-label">Онлайн</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pixels-count">0</div>
                <div class="stat-label">Пикселей</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="users-count">-</div>
                <div class="stat-label">Игроков</div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-title">Палитра</div>
            <div id="palette"></div>
        </div>
        
        <div class="panel">
            <div class="panel-title">Свой цвет</div>
            <div class="color-picker-row">
                <input type="color" id="color-picker" value="#e94560">
                <input type="text" class="color-hex" id="color-hex" value="#e94560" maxlength="7">
            </div>
            <div id="custom-colors"></div>
        </div>
        
        <div class="panel">
            <div class="panel-title">Управление</div>
            <div class="btn-group">
                <button class="btn btn-accent" id="zoom-in">➕</button>
                <button class="btn" id="zoom-out">➖</button>
                <button class="btn" id="reset-view">🔄</button>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-title">Как играть</div>
            <div class="help-item">
                <span class="help-key">ЛКМ</span>
                <span>Рисовать пиксель</span>
            </div>
            <div class="help-item">
                <span class="help-key">ПКМ</span>
                <span>Двигать холст</span>
            </div>
            <div class="help-item">
                <span class="help-key">Колесо</span>
                <span>Масштаб</span>
            </div>
            <div class="help-item">
                <span class="help-key">Кулдаун</span>
                <span>3 секунды</span>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-title">Размер холста</div>
            <div style="color: var(--text-muted); font-size: 14px;">
                <span id="canvas-width">1000</span> × <span id="canvas-height">1000</span>
            </div>
        </div>
        
        <button class="btn btn-danger" id="clear-btn">🗑️ Очистить весь холст</button>
        
        <div style="text-align: center; color: var(--text-muted); font-size: 12px;">
            Pixel Battle v2.0
        </div>
    </div>
    
    <!-- MAIN CANVAS -->
    <div id="main">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div id="coords">X: 0, Y: 0</div>
        <div id="cooldown">⏳ Кулдаун: <span id="cd-timer">0</span>с</div>
        <div id="pixel-info">Цвет: <span id="pixel-color">-</span></div>
        
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoom-in-btn">+</button>
            <button class="zoom-btn" id="zoom-out-btn">−</button>
            <button class="zoom-btn" id="fit-btn">⊡</button>
        </div>
        
        <div id="minimap">
            <canvas id="minimap-canvas"></canvas>
            <div id="minimap-viewport"></div>
        </div>
    </div>

    <script>
        // ===== КОНСТАНТЫ =====
        const CANVAS_WIDTH = 1000;
        const CANVAS_HEIGHT = 1000;
        const PIXEL_SIZE = 25;
        const COOLDOWN_TIME = 3000;
        
        // ===== ПАЛИТРА =====
        const COLORS = [
            // Row 1: Basic
            '#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff',
            // Row 2: Extended
            '#ff6600', '#9900ff', '#00ff99', '#ff0066', '#333333', '#666666', '#999999', '#cccccc',
            // Row 3: Game theme
            '#e94560', '#0f3460', '#533483', '#16213e', '#1a1a2e', '#1a4a7a', '#ff6b6b', '#c70039',
            // Row 4: Additional
            '#900c3f', '#581845', '#2c3e50', '#34495e', '#16a085', '#27ae60', '#2980b9', '#8e44ad'
        ];
        
        // ===== ПЕРЕМЕННЫЕ =====
        let canvas, ctx;
        let minimapCanvas, minimapCtx;
        let pixels = {};
        let scale = 1;
        let offsetX = 0, offsetY = 0;
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let currentColor = '#e94560';
        let lastDrawTime = 0;
        let cooldownRemaining = 0;
        let customColors = [];
        let cooldownInterval;
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            minimapCanvas = document.getElementById('minimap-canvas');
            minimapCtx = minimapCanvas.getContext('2d');
            minimapCanvas.width = 150;
            minimapCanvas.height = 150;
            
            canvas.width = CANVAS_WIDTH * PIXEL_SIZE;
            canvas.height = CANVAS_HEIGHT * PIXEL_SIZE;
            
            createPalette();
            loadFromLocalStorage();
            render();
            setupEvents();
            startCooldownTimer();
            updateStats();
            centerCanvas();
            
            setInterval(updateStats, 10000);
            
            document.getElementById('loading').style.display = 'none';
        }
        
        // ===== ПАЛИТРА =====
        function createPalette() {
            const palette = document.getElementById('palette');
            COLORS.forEach((color, i) => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch' + (i === 16 ? ' active' : '');
                swatch.style.backgroundColor = color;
                swatch.onclick = () => selectColor(color, swatch);
                palette.appendChild(swatch);
            });
        }
        
        function selectColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            if (element) element.classList.add('active');
            document.getElementById('color-picker').value = color;
            document.getElementById('color-hex').value = color;
        }
        
        // Color picker events
        document.getElementById('color-picker').addEventListener('input', (e) => {
            currentColor = e.target.value;
            document.getElementById('color-hex').value = e.target.value;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            addCustomColor(currentColor);
        });
        
        document.getElementById('color-hex').addEventListener('change', (e) => {
            let val = e.target.value;
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
                currentColor = val;
                document.getElementById('color-picker').value = val;
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                addCustomColor(val);
            }
        });
        
        function addCustomColor(color) {
            if (!customColors.includes(color)) {
                customColors = [color, ...customColors].slice(0, 10);
                try {
                    localStorage.setItem('pixelbattle_colors', JSON.stringify(customColors));
                } catch(e) {}
                renderCustomColors();
            }
        }
        
        function renderCustomColors() {
            const container = document.getElementById('custom-colors');
            container.innerHTML = '';
            customColors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'custom-color';
                div.style.backgroundColor = color;
                div.onclick = () => selectColor(color);
                container.appendChild(div);
            });
        }
        
        // ===== СОХРАНЕНИЕ =====
        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('pixelbattle_pixels');
                if (saved) pixels = JSON.parse(saved);
                
                const colors = localStorage.getItem('pixelbattle_colors');
                if (colors) {
                    customColors = JSON.parse(colors);
                    renderCustomColors();
                }
            } catch(e) {
                console.log('LocalStorage error:', e);
            }
        }
        
        function saveToLocalStorage() {
            try {
                localStorage.setItem('pixelbattle_pixels', JSON.stringify(pixels));
            } catch(e) {}
        }
        
        // ===== РЕНДЕРИНГ =====
        function render() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            for (let y = 0; y < CANVAS_HEIGHT; y++) {
                for (let x = 0; x < CANVAS_WIDTH; x++) {
                    const key = `${x},${y}`;
                    if (pixels[key]) {
                        ctx.fillStyle = pixels[key];
                        ctx.fillRect(x * PIXEL_SIZE, y * PIXEL_SIZE, PIXEL_SIZE - 1, PIXEL_SIZE - 1);
                    } else {
                        ctx.fillStyle = (x + y) % 2 === 0 ? '#1a1a2e' : '#222244';
                        ctx.fillRect(x * PIXEL_SIZE, y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
                    }
                }
            }
            
            ctx.restore();
            
            renderMinimap();
        }
        
        function renderMinimap() {
            minimapCtx.fillStyle = '#0f0f23';
            minimapCtx.fillRect(0, 0, 150, 150);
            
            const scale = 150 / CANVAS_WIDTH;
            
            for (let y = 0; y < CANVAS_HEIGHT; y++) {
                for (let x = 0; x < CANVAS_WIDTH; x++) {
                    const key = `${x},${y}`;
                    if (pixels[key]) {
                        minimapCtx.fillStyle = pixels[key];
                        minimapCtx.fillRect(x * scale, y * scale, Math.ceil(scale), Math.ceil(scale));
                    }
                }
            }
            
            updateMinimapViewport();
        }
        
        function updateMinimapViewport() {
            const container = document.getElementById('main');
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            const viewWidth = containerWidth / scale;
            const viewHeight = containerHeight / scale;
            const viewX = -offsetX / scale / PIXEL_SIZE;
            const viewY = -offsetY / scale / PIXEL_SIZE;
            
            const minimapScale = 150 / CANVAS_WIDTH;
            
            const vp = document.getElementById('minimap-viewport');
            vp.style.left = (viewX * minimapScale) + 'px';
            vp.style.top = (viewY * minimapScale) + 'px';
            vp.style.width = (viewWidth * minimapScale) + 'px';
            vp.style.height = (viewHeight * minimapScale) + 'px';
        }
        
        // ===== СОБЫТИЯ =====
        function setupEvents() {
            const container = document.getElementById('canvas-container');
            
            container.addEventListener('mousedown', (e) => {
                if (e.button === 2 || e.button === 1) {
                    isDragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    container.style.cursor = 'grabbing';
                } else if (e.button === 0) {
                    placePixel(e);
                }
            });
            
            container.addEventListener('mousemove', (e) => {
                updateCoords(e);
                if (isDragging) {
                    offsetX += e.clientX - lastX;
                    offsetY += e.clientY - lastY;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    render();
                }
            });
            
            container.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'crosshair';
            });
            
            container.addEventListener('mouseleave', () => {
                isDragging = false;
                container.style.cursor = 'crosshair';
            });
            
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.85 : 1.15;
                scale = Math.max(0.1, Math.min(4, scale * delta));
                render();
            });
            
            container.addEventListener('contextmenu', (e) => e.preventDefault());
            
            // Zoom buttons
            document.getElementById('zoom-in').onclick = () => { scale = Math.min(4, scale * 1.3); render(); };
            document.getElementById('zoom-out').onclick = () => { scale = Math.max(0.1, scale / 1.3); render(); };
            document.getElementById('reset-view').onclick = () => { scale = 1; centerCanvas(); };
            document.getElementById('zoom-in-btn').onclick = () => { scale = Math.min(4, scale * 1.2); render(); };
            document.getElementById('zoom-out-btn').onclick = () => { scale = Math.max(0.1, scale / 1.2); render(); };
            document.getElementById('fit-btn').onclick = fitToScreen;
            
            // Clear button
            document.getElementById('clear-btn').onclick = () => {
                if (confirm('Очистить весь холст? Все пиксели будут удалены!')) {
                    pixels = {};
                    saveToLocalStorage();
                    render();
                    updateStats();
                }
            };
        }
        
        function placePixel(e) {
            const container = document.getElementById('canvas-container');
            const rect = container.getBoundingClientRect();
            
            const x = Math.floor((e.clientX - rect.left - offsetX) / scale / PIXEL_SIZE);
            const y = Math.floor((e.clientY - rect.top - offsetY) / scale / PIXEL_SIZE);
            
            if (x < 0 || x >= CANVAS_WIDTH || y < 0 || y >= CANVAS_HEIGHT) return;
            
            const now = Date.now();
            if (now - lastDrawTime < COOLDOWN_TIME) {
                showCooldown();
                return;
            }
            
            const key = `${x},${y}`;
            pixels[key] = currentColor;
            lastDrawTime = now;
            saveToLocalStorage();
            render();
            startCooldownTimer();
            updateStats();
        }
        
        function showCooldown() {
            const cd = document.getElementById('cooldown');
            cd.style.display = 'block';
            updateCooldownDisplay();
        }
        
        function startCooldownTimer() {
            if (cooldownInterval) clearInterval(cooldownInterval);
            cooldownRemaining = COOLDOWN_TIME;
            updateCooldownDisplay();
            
            const cd = document.getElementById('cooldown');
            cd.style.display = 'block';
            
            cooldownInterval = setInterval(() => {
                cooldownRemaining -= 100;
                if (cooldownRemaining <= 0) {
                    clearInterval(cooldownInterval);
                    cd.style.display = 'none';
                } else {
                    updateCooldownDisplay();
                }
            }, 100);
        }
        
        function updateCooldownDisplay() {
            const cdTime = Math.ceil(cooldownRemaining / 1000);
            document.getElementById('cd-timer').textContent = cdTime;
        }
        
        function updateCoords(e) {
            const container = document.getElementById('canvas-container');
            const rect = container.getBoundingClientRect();
            
            const x = Math.floor((e.clientX - rect.left - offsetX) / scale / PIXEL_SIZE);
            const y = Math.floor((e.clientY - rect.top - offsetY) / scale / PIXEL_SIZE);
            
            document.getElementById('coords').textContent = `X: ${x}, Y: ${y}`;
            
            const key = `${x},${y}`;
            const info = document.getElementById('pixel-info');
            const colorInfo = document.getElementById('pixel-color');
            
            if (pixels[key] && x >= 0 && x < CANVAS_WIDTH && y >= 0 && y < CANVAS_HEIGHT) {
                info.style.display = 'block';
                colorInfo.textContent = pixels[key];
                colorInfo.style.backgroundColor = pixels[key];
                colorInfo.style.padding = '2px 8px';
                colorInfo.style.borderRadius = '4px';
            } else {
                info.style.display = 'none';
            }
        }
        
        function centerCanvas() {
            const container = document.getElementById('canvas-container');
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            const scaledW = canvas.width * scale;
            const scaledH = canvas.height * scale;
            
            if (scaledW < containerWidth) {
                offsetX = (containerWidth - scaledW) / 2;
            } else {
                offsetX = Math.min(0, Math.max(containerWidth - scaledW, offsetX));
            }
            
            if (scaledH < containerHeight) {
                offsetY = (containerHeight - scaledH) / 2;
            } else {
                offsetY = Math.min(0, Math.max(containerHeight - scaledH, offsetY));
            }
            
            render();
        }
        
        function fitToScreen() {
            const container = document.getElementById('canvas-container');
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            const scaleX = containerWidth / canvas.width;
            const scaleY = containerHeight / canvas.height;
            
            scale = Math.min(scaleX, scaleY) * 0.95;
            centerCanvas();
        }
        
        function updateStats() {
            const pixelCount = Object.keys(pixels).length;
            const onlineCount = Math.floor(Math.random() * 80) + 20;
            const usersCount = Math.floor(Math.random() * 30) + 5;
            
            document.getElementById('pixels-count').textContent = pixelCount.toLocaleString();
            document.getElementById('online').textContent = onlineCount;
            document.getElementById('users-count').textContent = usersCount;
            document.getElementById('canvas-width').textContent = CANVAS_WIDTH;
            document.getElementById('canvas-height').textContent = CANVAS_HEIGHT;
        }
        
        // ===== ЗАПУСК =====
        window.onload = init;
        
        window.addEventListener('resize', () => {
            centerCanvas();
            render();
        });
    </script>
</body>
</html>
